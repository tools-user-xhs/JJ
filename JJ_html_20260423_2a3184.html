<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>基金筛选SOP全流程 | 专业投资指南</title>
    <!-- 引入Font Awesome 6 (免费图标库，增强视觉) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 使用现代字体系统 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f6 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, 'Noto Sans', sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }

        /* 整体容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 高端卡片头部 */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .hero h1 {
            font-size: 2.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1E3C5C, #2A5F7A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
        .hero p {
            font-size: 1rem;
            color: #4a627a;
            max-width: 650px;
            margin: 0 auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 0.75rem;
        }

        /* 控制栏: 下拉 + 按钮 高级感 */
        .control-panel {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            border-radius: 56px;
            padding: 0.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02), inset 0 1px 0 rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.6);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .select-wrapper {
            flex: 2;
            min-width: 240px;
        }
        .select-wrapper select {
            width: 100%;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            background: #ffffff;
            border: 1px solid #dce5ef;
            border-radius: 44px;
            color: #1a2c3e;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .select-wrapper select:focus {
            border-color: #2A7F6E;
            box-shadow: 0 0 0 3px rgba(42,127,110,0.15);
        }

        .btn-query {
            background: #1E3C5C;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 44px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .btn-query i {
            font-size: 1rem;
        }
        .btn-query:hover {
            background: #0f2c44;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -10px rgba(30,60,92,0.3);
        }

        /* 内容卡片区域 — 高级白+细腻阴影 */
        .sop-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.02);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s;
            border: 1px solid #f0f2f5;
        }

        /* 内容内部样式 */
        .sop-content {
            line-height: 1.5;
        }
        .sop-content h2 {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid #e1e9f0;
            display: inline-block;
            letter-spacing: -0.2px;
            color: #1F4E6E;
        }
        .sop-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 1.5rem 0 0.8rem 0;
            color: #2C5A74;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sop-content h3 i {
            color: #2A7F6E;
            font-size: 1.4rem;
        }
        .step-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 0.5rem;
        }
        .step-item {
            background: #F9FBFD;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            border-left: 5px solid #2A7F6E;
            transition: 0.1s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .step-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #1F3B4C;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .step-title i {
            font-size: 1.3rem;
            color: #2A7F6E;
            width: 28px;
        }
        .step-desc {
            color: #2c4b62;
            margin-left: 40px;
            font-size: 0.95rem;
        }
        .metric-badge {
            background: #EFF6F0;
            display: inline-block;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2A7F6E;
            margin-right: 0.6rem;
            margin-bottom: 0.4rem;
        }
        .warning-note {
            background: #FFF7E5;
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            border-left: 4px solid #E6A017;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        .visual-placeholder {
            background: #EFF3F8;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            margin: 1rem 0 0.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: #2c5f7a;
            border: 1px dashed #bdd3e6;
        }
        .simple-chart {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 50px;
            margin-top: 8px;
        }
        .bar {
            background: #2A7F6E;
            width: 28px;
            border-radius: 8px 8px 4px 4px;
            transition: 0.1s;
        }
        .inline-icon {
            font-size: 1.3rem;
            vertical-align: middle;
            margin-right: 6px;
        }
        .footer-disclaimer {
            margin-top: 2rem;
            font-size: 0.75rem;
            text-align: center;
            color: #8ba0b2;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.2rem;
        }
        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            .control-panel {
                border-radius: 32px;
                background: white;
            }
            .sop-card {
                padding: 1.5rem;
            }
            .step-desc {
                margin-left: 0px;
            }
            .step-title {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1><i class="fas fa-chart-line" style="color: #2A7F6E; margin-right: 10px;"></i>基金筛选SOP全流程</h1>
        <p>专业投基体系 · 从入门到筛选 · 小白实操指南</p>
    </div>

    <div class="control-panel">
        <div class="select-wrapper">
            <select id="sopSelect">
                <option value="preface">📘 前言</option>
                <option value="why">💡 为什么要买基金</option>
                <option value="howbuy">📱 如何操作投资购买基金 - 投资入口</option>
                <option value="howfilter">🔍 如何识别优秀基金</option>
                <option value="reminder">⚠️ 友情提醒</option>
            </select>
        </div>
        <button class="btn-query" id="queryBtn"><i class="fas fa-search"></i> 查询流程</button>
    </div>

    <div class="sop-card" id="sopDisplay">
        <div class="sop-content" id="dynamicContent">
            <!-- 动态渲染内容将由js填充，默认展示前言 -->
            <div style="text-align: center; padding: 2rem 0;"><i class="fas fa-spinner fa-pulse"></i> 加载指南中...</div>
        </div>
        <div class="footer-disclaimer">
            <i class="fas fa-shield-alt"></i> 以上内容仅作投教参考，不构成投资建议。市场有风险，投资需谨慎。
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 各模块详细 SOP 内容 (结构化 + 图示元素)
    // 所有内容基于提供的文档整理，并增加视觉图形示意
    // --------------------------------------------------------------
    const contentMap = {
        preface: `
            <h2><i class="fas fa-book-open"></i> 前言 · 基金是什么</h2>
            <div class="step-grid">
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-chart-pie"></i> 基金定义</div>
                    <div class="step-desc">基金是指通过发售基金份额，将众多不特定投资者的资金汇集起来，委托专业基金管理人投资管理，并由托管人托管，以谋求资产增值的工具。</div>
                </div>
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-watermelon"></i> 经典比喻 · “买西瓜理论”</div>
                    <div class="step-desc">如果你觉得买一整个股票(西瓜)太贵，也不知怎么挑，就和朋友凑钱买西瓜，请懂行的师傅(基金经理)帮你挑最好的，切开每人分一块。既尝到甜头，也分散了风险。</div>
                    <div class="visual-placeholder">
                        <i class="fas fa-users fa-2x" style="color:#2A7F6E;"></i>
                        <span>🍉 众筹买瓜 → 专家挑选 → 分散持有 → 风险共担</span>
                    </div>
                </div>
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-chart-simple"></i> 基金优势速览</div>
                    <div class="step-desc">✔ 专业管理  ✔ 分散风险  ✔ 门槛极低(10元起)  ✔ 流动性好  ✔ 受严格监管</div>
                </div>
            </div>
        `,
        why: `
            <h2><i class="fas fa-rocket"></i> 为什么要买基金</h2>
            <div class="step-grid">
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-brain"></i> 1. 专业管理 · 解决知识/时间不够</div>
                    <div class="step-desc">股票投资需要研究宏观、行业、财报，全职工作很难兼顾。基金等于雇了一个专业团队（基金经理+研究员）为你打工，决策买卖更专业。</div>
                </div>
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-shield-virus"></i> 2. 分散投资 · 降低踩雷风险</div>
                    <div class="step-desc">“不要把所有鸡蛋放一个篮子”。基金通常持有几十上百只股票，单一公司暴雷影响极小，几乎不可能亏到零，而单只股票可能血本无归。</div>
                    <div class="visual-placeholder">
                        <i class="fas fa-basket-shopping"></i> 一篮子优质资产: 茅台+腾讯+宁德时代+...
                    </div>
                </div>
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-coins"></i> 3. 门槛极低 · 小额轻松入场</div>
                    <div class="step-desc">10元、1元即可起投，轻松成为苹果、腾讯等优质公司的间接股东，而自己构建分散组合需要数千甚至数万元。</div>
                </div>
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-mobile-alt"></i> 4. 方便快捷 · 流动性好</div>
                    <div class="step-desc">支付宝/微信/银行APP几分钟完成买卖，开放式基金赎回通常几个工作日到账，变现能力强。</div>
                </div>
            </div>
        `,
        howbuy: `
            <h2><i class="fas fa-map-signs"></i> 如何操作投资购买基金 · 投资入口</h2>
            <div class="step-grid">
                <div class="step-item">
                    <div class="step-title"><i class="fab fa-alipay"></i> 步骤 1：打开支付宝，点击「理财」</div>

                <div class="step-item">
                    <div class="step-title"><i class="fas fa-chart-line"></i> 步骤 2：找到「基金」模块并进入</div>
                    <div class="step-desc">在理财页面上方或中部找到「基金」入口，点击进入基金市场。</div>
                </div>
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-trophy"></i> 步骤 3：点击「基金市场」→「基金排行」</div>
                    <div class="step-desc">查看业绩排行、热门基金，按涨跌幅、风险等级初步筛选。</div>
                    <div class="visual-placeholder">
                        <i class="fas fa-list-ol"></i> 参考年限建议≥3年，经得起市场考验的基金
                    </div>
                </div>
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-hand-holding-usd"></i> 步骤 4：选择一只基金，开启筛选流程</div>
                    <div class="step-desc">点击进入基金详情页，结合“识别优秀基金”模块进一步深度分析。</div>
                </div>
                <div class="warning-note">
                    <i class="fas fa-info-circle"></i> 除了支付宝，也可通过微信理财通、天天基金、银行APP等渠道，操作逻辑相似。
                </div>
            </div>
        `,
        howfilter: `
            <h2><i class="fas fa-filter"></i> 如何识别优秀基金 · 七步筛选法</h2>
            <div class="step-grid">
                <!-- 步骤1：基金初印象 -->
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-eye"></i> 1. 基金初印象：名称 & 涨跌幅</div>
                    <div class="step-desc">看基金名称判断行业主题；观察近期涨跌幅，评估当前是高位还是低估区间。根据自身风险承受力选择相应风险等级产品（R1-R5）。<span class="metric-badge">参考年限：3年以上</span></div>
                    <div class="visual-placeholder">
                        <i class="fas fa-chart-simple"></i> 图示：近3年业绩走势 + 最大回撤示意图
                        <div class="simple-chart">
                            <div style="height:28px; width:30px; background:#2A7F6E; border-radius:6px;"></div>
                            <div style="height:42px; width:30px; background:#3C9B85;"></div>
                            <div style="height:35px; width:30px; background:#56B4A0;"></div>
                            <div style="height:48px; width:30px; background:#2A7F6E;"></div>
                            <span style="font-size:12px;">📈 稳步向上</span>
                        </div>
                    </div>
                </div>
                <!-- 步骤2：业绩走势+回撤修复 -->
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-chart-line"></i> 2. 业绩走势 & 回撤修复能力</div>
                    <div class="step-desc">✔ 点开“业绩走势”观察长期是否向上。<br>✔ 关键指标「回撤修复」：基金净值从最大回撤中恢复所需天数。修复时间长的不选（回本慢，体验差）。</div>
                    <div class="visual-placeholder">
                        <i class="fas fa-hourglass-half"></i> 回撤修复快 → 优秀  |  慢 → 谨慎
                    </div>
                </div>
                <!-- 步骤3：基金背景/经理/规模 -->
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-building"></i> 3. 透视基金背景 & 经理资历</div>
                    <div class="step-desc"><span class="metric-badge">成立年限</span>越久越好（经得起牛熊考验）。<span class="metric-badge">基金经理年均回报</span>、从业经验≥5年更佳。<span class="metric-badge">基金规模</span>低于20亿不选（规模过小易清盘或风格漂移）。<span class="metric-badge">持有人结构</span>个人持有多 → 散户居多，机构占比需参考。</div>
                    <div class="visual-placeholder">
                        <i class="fas fa-chart-pie"></i> 优选规模20亿~200亿，成立5年以上，经理任职稳定
                    </div>
                </div>
                <!-- 步骤4：历史净值红绿规律 -->
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-calendar-week"></i> 4. 历史净值波动规律（择时参考）</div>
                    <div class="step-desc">🔴 绿多红少 → 买入后亏损概率较大。<br>🟢🔴 红绿相间 → 市场震荡，需定投。<br>🔥 连续多日红盘 → 潜力股可果断关注。</div>
                    <div class="visual-placeholder">
                        <i class="fas fa-square green" style="color:#2A7F6E;">🟢</i> 红柱多 <i class="fas fa-arrow-right"></i> 趋势向好 
                        <i class="fas fa-square red" style="color:#E86B6B;">🔴</i> 绿柱多 <i class="fas fa-arrow-right"></i> 风险偏高
                    </div>
                </div>
                <!-- 步骤5：基金持仓明细 行业风口 -->
                <div class="step-item">
                    <div class="step-title"><i class="fas fa-chart-column"></i> 5. 持仓明细 & 行业风口</div>
                    <div class="step-desc">点开“基金持仓”查看前十大重仓股，分析所属行业是否处于趋势风口，个股估值是否合理。判断第二天大致涨跌预期。</div>
                    <div class="visual-placeholder">
                        <i class="fas fa-microchip"></i> 科技风口？ <i class="fas fa-leaf"></i> 新能源？ <i class="fas fa-heartbeat"></i> 医疗？ 优选高景气赛道
                    </div>
                </div>
                <!-- 步骤6：手续费及综合决策 -->

                    <div class="step-title"><i class="fas fa-tags"></i> 6. 最后决断：手续费 & 综合评估</div>
                    <div class="step-desc">✔ 优先选择申购费0折或低费率基金，C类份额持有短期的更划算。<br>✔ 以上所有指标通过后再购入，不要冲动跟风。</div>
                    <div class="visual-placeholder">
                        <i class="fas fa-check-circle" style="color:#2A7F6E;"></i> 0申购费 + 低管理费 = 节省成本
                    </div>
                </div>
            </div>
            <div class="warning-note">
                <i class="fas fa-lightbulb"></i> 核心口诀：看长跑业绩、选老牌经理、规模要适中、回撤修复快、行业有风口！
            </div>
        `,
        reminder: `

                <div class="step-item">

                </div>
                <div class="visual-placeholder">
                    <i class="fas fa-chart-line" style="color:#E6A017;"></i> 长期持有 + 纪律定投 = 克服人性弱点
                </div>
                <div class="warning-note">
                    <i class="fas fa-stopwatch"></i> 特别提示：不要追涨杀跌，不要盲目跟风“冠军基金”，历史业绩不代表未来表现。
                </div>
            </div>
        `
    };

    // 附加功能：默认展示前言内容
    function renderSOP(optionValue) {
        const container = document.getElementById('dynamicContent');
        if (contentMap[optionValue]) {
            container.innerHTML = contentMap[optionValue];
        } else {
            container.innerHTML = `<div class="warning-note"><i class="fas fa-exclamation-circle"></i> 未找到相关流程，请刷新重试。</div>`;
        }
        // 添加一点点微动画（平滑滚动到内容区）
        document.getElementById('sopDisplay').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 绑定查询按钮
    const queryBtn = document.getElementById('queryBtn');
    const selectEl = document.getElementById('sopSelect');

    function handleQuery() {
        const selected = selectEl.value;
        renderSOP(selected);
    }

    queryBtn.addEventListener('click', handleQuery);

    // 页面初始化展示前言（默认）
    renderSOP('preface');

    // 额外给下拉框加上回车/触摸优化，同时满足高端体验
    selectEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleQuery();
    });

    // 添加响应式调整辅助 (不用额外动作)
</script>
</body>
</html>
